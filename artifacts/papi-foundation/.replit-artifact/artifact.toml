kind = "web"
previewPath = "/"
title = "Papi Foundation"
version = "1.0.0"
id = "artifacts/papi-foundation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24545

[services.development]
run = "pnpm --filter @workspace/papi-foundation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/papi-foundation", "run", "build" ]
publicDir = "artifacts/papi-foundation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24545"
BASE_PATH = "/"
